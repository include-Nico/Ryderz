<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ryderz</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div id="app-container">
        <button id="global-audio-btn" onclick="toggleAudio()" style="position: absolute; top: 75px; right: 15px; z-index: 9999; background: #1A1A2E; border: 2px solid var(--neon-orange); color: white; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px;">
            🔇
        </button>
        <div id="screens-area"></div>
        <nav id="bottom-tabs">
            <button class="tab-btn active" onclick="loadScreen('home', this)">🏠<br>Home</button>
            <button class="tab-btn" onclick="loadScreen('garage', this)">🏎️<br>Garage</button>
            <button class="tab-btn" onclick="loadScreen('settings', this)">⚙️<br>Opzioni</button>
        </nav>
    </div>
    <script src="js/player.js"></script>
    <script src="js/traffic.js"></script>
    <script src="js/game.js"></script>
    <script src="js/garage.js"></script>
    <script src="js/app.js"></script>
