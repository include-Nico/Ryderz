<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ryderz</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <div id="app-container" style="position: relative;">
        
        <button id="global-audio-btn" onclick="toggleAudio()" style="position: absolute; top: 15px; right: 15px; z-index: 9999; background: #1A1A2E; border: 2px solid #FF6A00; color: white; padding: 0; border-radius: 50%; font-size: 20px; cursor: pointer; box-shadow: 0 0 15px rgba(255,106,0,0.5); display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; transition: all 0.2s;">
            🔇
        </button>

        <div id="screens-area"></div>

        <nav id="bottom-tabs">
            <button class="tab-btn active" onclick="loadScreen('home', this)">
                <span class="tab-icon">🏠</span><br>Home
            </button>
            <button class="tab-btn" onclick="loadScreen('garage', this)">
                <span class="tab-icon">🏎️</span><br>Garage
            </button>
            <button class="tab-btn" onclick="loadScreen('settings', this)">
                <span class="tab-icon">⚙️</span><br>Opzioni
            </button>
        </nav>
    </div>

    <script src="js/player.js"></script>
    <script src="js/traffic.js"></script>
    <script src="js/game.js"></script>
    <script src="js/garage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
