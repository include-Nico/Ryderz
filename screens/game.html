<section id="screen-game" class="screen full-screen active">

    <!-- HUD -->
    <div id="game-ui">
        <div class="hud-left">
            <span id="score">Punti: 0</span>
            <div class="hud-speed-row">
                <span id="speedometer">0 km/h</span>
                <span id="gear-display">M: 1</span>
            </div>
        </div>
        <button id="btn-pause" onclick="togglePause()">⏸ PAUSA</button>
    </div>

    <!-- Menu Pausa -->
    <div id="pause-menu" style="display:none;">
        <h2 class="pause-title">IN PAUSA</h2>
        <button class="play-btn success" onclick="togglePause()">▶ RIPRENDI</button>
        <button class="play-btn danger"  onclick="quitGame()">🏠 MENU PRINCIPALE</button>
    </div>

    <!-- Canvas di gioco -->
    <canvas id="gameCanvas" width="400" height="600"></canvas>

</section>
