<section id="screen-game" class="screen full-screen active">
    <div id="game-ui">
        <div class="hud-left">
            <span id="score">Punti: 0</span>
            
            <div class="hud-speed-row">
                <span id="speedometer">0 km/h</span>
                <span id="gear-display">Marcia: 1</span>
            </div>
        </div>

        <button id="btn-pause" onclick="togglePause()" ontouchend="togglePause()">⏸ PAUSA</button>
    </div>

    <div id="pause-menu">
        <h2 class="pause-title">IN PAUSA</h2>
        <button class="play-btn success" onclick="togglePause()" ontouchend="togglePause()">▶️ RIPRENDI</button>
        <button class="play-btn danger" onclick="quitGame()" ontouchend="quitGame()">🏠 MENU PRINCIPALE</button>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
</section>
