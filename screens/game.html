<section id="screen-game" class="screen full-screen active">

    <!-- HUD -->
    <div id="game-ui">
        <!-- Left cluster: score + speedometer -->
        <div class="hud-left">
            <span id="score">Punti: 0</span>
            <div class="hud-speed-row">
                <span id="speedometer">30 km/h</span>
                <span id="gear-display">Marcia: 1</span>
            </div>
        </div>

        <button id="btn-pause" onclick="togglePause()">⏸ PAUSA</button>
    </div>

    <!-- Pause overlay -->
    <div id="pause-menu" style="display:none;">
        <h2 class="pause-title">PAUSA</h2>
        <button class="play-btn success" onclick="togglePause()">▶ RIPRENDI</button>
        <button class="play-btn danger"  onclick="quitGame()">⬛ MENU</button>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

</section>
