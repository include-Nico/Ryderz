<section id="screen-game" class="screen full-screen active">
    <div id="game-ui">
        <div style="display: flex; flex-direction: column;">
            <span id="score">Punti: 0</span>
            
            <div style="display: flex; align-items: baseline; gap: 12px; margin-top: 5px;">
                <span id="speedometer" style="font-size: 24px; font-weight: bold; color: #00e5ff; text-shadow: 2px 2px 4px #000;">30 km/h</span>
                <span id="gear-display" style="font-size: 18px; font-weight: bold; color: #FFEB3B; text-shadow: 1px 1px 2px #000;">Marcia: 1</span>
            </div>
            
        </div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
</section>
