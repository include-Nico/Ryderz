<section id="screen-game" class="screen full-screen active">
    <div id="game-ui" style="position: absolute; width: 100%; padding: 20px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none;">
        <div style="pointer-events: auto;">
            <p id="score" style="font-family: 'Orbitron'; color: var(--neon-cyan); font-size: 20px;">Punti: 0</p>
            <p id="speedometer" style="font-family: 'Orbitron'; color: var(--text-primary); font-size: 16px;">0 km/h</p>
        </div>
        <button onclick="togglePause()" style="pointer-events: auto; background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 5px 15px; border-radius: 5px; cursor: pointer;">⏸ PAUSA</button>
    </div>

    <div id="pause-menu" style="display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; z-index: 100;">
        <h2 style="font-family: 'Orbitron'; color: var(--neon-orange); margin-bottom: 30px;">IN PAUSA</h2>
        <button class="play-btn success" onclick="togglePause()" style="margin-bottom: 15px; width: 200px;">RIPRENDI</button>
        <button class="play-btn danger" onclick="quitGame()" style="width: 200px; background: #8B0000;">ESCI</button>
    </div>

    <canvas id="gameCanvas" width="400" height="600" style="background: #222; box-shadow: 0 0 50px rgba(0,0,0,0.5);"></canvas>
</section>
