<section id="screen-result" class="screen active">
    <h2 style="font-family: 'Orbitron'; font-size: 40px; color: var(--neon-orange); margin-bottom: 30px;">CRASH!</h2>
    
    <div style="background: var(--bg-card); border: 1px solid var(--border-dim); padding: 30px; border-radius: 15px; text-align: center; width: 80%; margin-bottom: 40px;">
        <p style="color: var(--text-muted); letter-spacing: 2px;">PUNTEGGIO</p>
        <h3 id="result-score" style="font-family: 'Orbitron'; font-size: 32px; color: #FFF; margin-bottom: 20px;">0</h3>
        
        <div style="height: 1px; background: var(--border-dim); margin-bottom: 20px;"></div>
        
        <p style="color: var(--text-muted); letter-spacing: 2px;">GUADAGNO</p>
        <h3 id="result-cash" style="font-family: 'Orbitron'; font-size: 32px; color: #00E676;">💵 0</h3>
    </div>

    <button class="play-btn" onclick="loadScreen('game')" style="margin-bottom: 15px; width: 250px;">CORRI ANCORA</button>
    <button class="play-btn secondary" onclick="loadScreen('home')" style="width: 250px;">MENU PRINCIPALE</button>
</section>
