<section id="screen-garage" class="screen active">

    <h2 class="garage-header">GARAGE</h2>
    <p class="garage-sub">Scegli la tua auto</p>

    <div style="
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        border-top: 2px solid var(--neon-cyan);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        width: 85%;
        max-width: 320px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(0,240,255,0.06);
    ">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button onclick="changeCar(-1)" style="background:none;border:none;color:var(--neon-cyan);font-size:30px;cursor:pointer;">◀</button>
            
            <div style="height: 120px; display: flex; align-items: center; justify-content: center;">
                <img id="g-car-img" src="" alt="Auto" style="max-height: 100px; max-width: 150px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));">
            </div>
            
            <button onclick="changeCar(1)" style="background:none;border:none;color:var(--neon-cyan);font-size:30px;cursor:pointer;">▶</button>
        </div>

        <p id="g-car-name" style="font-family:'Orbitron',monospace;font-size:20px;color:var(--neon-cyan);letter-spacing:.1em;margin-bottom:2px;">NOME AUTO</p>
        <p id="g-car-status" style="font-size:13px;letter-spacing:.15em;text-transform:uppercase;">Stato</p>

        <div style="border-top:1px solid var(--border-dim);margin:15px 0;"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:left;margin-bottom: 20px;">
            <div>
                <p style="font-size:11px;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;">Velocità</p>
                <p style="font-family:'Orbitron',monospace;font-size:18px;color:var(--text-primary);"><span id="g-stat-speed">0</span></p>
            </div>
            <div>
                <p style="font-size:11px;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;">Sterzata</p>
                <p style="font-family:'Orbitron',monospace;font-size:18px;color:var(--text-primary);"><span id="g-stat-handling">0</span></p>
            </div>
        </div>

        <button id="g-action-btn" class="play-btn secondary" style="width: 100%; padding: 12px; font-size: 14px; display: none;">SELEZIONA</button>

    </div>

    <script>
        setTimeout(initGarage, 50);
    </script>
</section>
